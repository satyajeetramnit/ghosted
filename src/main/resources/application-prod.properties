# Production Profile for Render + Neon DB
server.servlet.context-path=/api
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Render environment variables mapping (matching User's requested names)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Performance & Stability optimizations
spring.jpa.open-in-view=false
logging.level.com.ghosted=INFO
logging.level.org.hibernate.SQL=WARN

# Neon Free Tier optimization
spring.datasource.hikari.maximum-pool-size=5

# Dynamic port binding
server.port=${PORT:8080}

# Serialize dates as ISO strings not arrays
spring.jackson.serialization.write-dates-as-timestamps=false

# Memory and N+1 Optimization
spring.jpa.properties.hibernate.default_batch_fetch_size=20

